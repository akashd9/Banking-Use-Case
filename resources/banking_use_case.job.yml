resources:
  jobs:
    banking_transformations:
      name: banking-transformations-${bundle.target}
      tasks:
        - task_key: run_transformations
          spark_python_task:
            python_file: ../src/main.py
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
