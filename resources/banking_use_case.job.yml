resources:
  jobs:
    banking_transformations:
      name: banking-transformations-${bundle.target}
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: run_transformations
          spark_python_task:
            python_file: ../src/main.py
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
